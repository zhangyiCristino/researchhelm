name: Security gates

on:
  push:
    branches: [master, "codex/**"]
  pull_request:
    branches: [master, "codex/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-audit:
    name: Full-history repository audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Audit tracked state, history, identities, and candidate archive
        run: python skills/researchhelm/scripts/audit_release.py all --root . --ref HEAD

  gitleaks:
    name: Gitleaks 8.30.1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download and verify the pinned scanner
        shell: bash
        run: |
          archive="$RUNNER_TEMP/gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          printf '%s  %s\n' \
            "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb" \
            "$archive" | sha256sum --check --status
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan reachable Git history with full redaction
        shell: bash
        run: |
          if "$RUNNER_TEMP/gitleaks" git --redact=100 --no-banner --no-color --log-level=error --max-archive-depth=2 . >/dev/null 2>&1; then
            exit 0
          else
            scanner_status=$?
            echo "Gitleaks blocked release or failed." >&2
            exit "$scanner_status"
          fi
